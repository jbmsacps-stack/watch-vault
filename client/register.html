<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Vault</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-page">
  <main class="auth-wrapper">
    <section class="auth-card">

      <a href="index.html" class="auth-logo">
        <span>WatchVault</span>
      </a>

      <p class="eyebrow">Get started</p>
      <h1>Create your account.</h1>
      <p class="auth-subtitle">
        Save movies, build lists, and manage your watch vault.
      </p>

      <form id="registerForm" class="auth-form">
        <input type="text" id="registerUsername" placeholder="Username" required />
        <input type="email" id="registerEmail" placeholder="Email address" required />
        <input type="password" id="registerPassword" placeholder="Password" required />

        <button type="submit">Create Account</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

      <p class="auth-message" id="registerMessage"></p>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
