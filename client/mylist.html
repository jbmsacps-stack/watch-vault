<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vault | WatchVault</title>
    <meta name="description" content="Manage your WatchVault titles, create custom watchlists, organize movies, series, and anime, and keep your entertainment plans in one place.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/kGgDBffg/Chat-GPT-Image-Apr-28-2026-11-48-12-PM.png">
</head>

<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">

            <a href="index.html" class="logo">
                <img src="https://i.postimg.cc/kGgDBffg/Chat-GPT-Image-Apr-28-2026-11-48-12-PM.png"
                    alt="WatchVault logo" width="38" height="38" fetchpriority="high">
                <span>WatchVault</span>
            </a>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="mylist.html">MyList</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>

            <div class="nav-actions">
                <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
                    <span class="toggle-track"></span>
                    <span class="toggle-thumb"></span>
                </button>
                <a href="login.html" class="signin-btn">Sign In</a>
            </div>

        </nav>
    </header>

    <main class="mylist-page">
        <section class="mylist-hero" aria-label="WatchVault list management">
            <p class="eyebrow">Your vault</p>
            <h1>Build custom watch lists.</h1>
            <p>Create lists for movies, series, anime, rewatch plans, weekend picks, or anything you want.</p>
        </section>

        <section class="create-list-box" aria-label="Create a custom watchlist">
            <input type="text" id="customListInput" placeholder="Create a list: Weekend Watchlist..." autofocus>
            <button id="createListBtn" type="button">Create List</button>
        </section>

        <section class="custom-lists" id="customLists" aria-label="Custom watchlists"></section>

        <div class="edit-list-modal" id="editListModal" aria-label="Edit watchlist modal">
            <div class="edit-list-box">
                <h2 id="editModalTitle">Edit List</h2>

                <input type="text" id="editListInput" placeholder="Enter value...">

                <div class="edit-actions">
                    <button id="cancelEditBtn" type="button">Cancel</button>
                    <button id="saveEditBtn" type="button">Save</button>
                </div>
            </div>
        </div>

        <section class="added-from-explore" aria-label="Titles added from Explore">
            <h2>Added From Explore</h2>
            <ul class="saved-title-list" id="savedTitleList"></ul>
            <button id="clearAllBtn" type="button">Clear All</button>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>

</html>
